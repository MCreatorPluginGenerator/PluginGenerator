templates:
  - template: triggerimpl/custom.java.ftl.ftl
    condition: 'getGeneratorFlavor() %= CUSTOM'
    writer: file
    name: "@RESROOT/@[getGeneratorName()]/triggers/@[getTriggerName()].java.ftl"
  - template: triggerimpl/neoforge.java.ftl.ftl
    condition: 'getGeneratorFlavor() %= NEOFORGE'
    writer: file
    name: "@RESROOT/@[getGeneratorName()]/triggers/@[getTriggerName()].java.ftl"
  - template: triggerimpl/forge.java.ftl.ftl
    condition: 'getGeneratorFlavor() %= FORGE'
    writer: file
    name: "@RESROOT/@[getGeneratorName()]/triggers/@[getTriggerName()].java.ftl"
  - template: triggerimpl/fabric.java.ftl.ftl
    condition: 'getGeneratorFlavor() %= FABRIC'
    writer: file
    name: "@RESROOT/@[getGeneratorName()]/triggers/@[getTriggerName()].java.ftl"
templates:
  - template: variable.json.ftl
    condition: generate
    writer: json
    name: "@RESROOT/variables/@[getName()].json"

localizationkeys:
  - key: blockly.block.custom_dependency_@registryname
    condition: generate
    mapto: customVariableDependencyLocalization
  - key: blockly.block.set_var_@registryname
    condition: generate
    mapto: getSetterLocalization()
  - key: blockly.block.get_var_@registryname
    condition: generate
    mapto: getGetterLocalization()
  - key: blockly.block.return_@registryname
    condition: generate
    mapto: getReturnLocalization()
  - key: blockly.block.procedure_retval_@registryname
    condition: generate
    mapto: getCallAndGetLocalization()